<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — Price Scraper</title>
  <style>
    :root {
      --bg:        #f4f5f7;
      --surface:   #ffffff;
      --border:    #dfe1e6;
      --text:      #172b4d;
      --muted:     #6b778c;
      --primary:   #0052cc;
      --success:   #00875a;
      --danger:    #de350b;
      --warning:   #ff8b00;
      --radius:    6px;
      --shadow:    0 1px 3px rgba(0,0,0,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 15px;
    }

    /* ── Navigation ── */
    nav {
      background: var(--text);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 0;
      height: 48px;
    }
    .nav-brand {
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .02em;
      margin-right: 24px;
      color: #fff;
      text-decoration: none;
    }
    nav a.nav-link {
      color: rgba(255,255,255,.75);
      text-decoration: none;
      font-size: .875rem;
      padding: 0 14px;
      height: 48px;
      display: flex;
      align-items: center;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav a.nav-link:hover,
    nav a.nav-link.active {
      color: #fff;
      border-bottom-color: #4c9aff;
    }

    /* ── Main content ── */
    main {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px 48px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    /* ── Shared badges ── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .badge-near-miss           { background: #deebff; color: #0052cc; }
    .badge-compare-matchers    { background: #e3fcef; color: #006644; }
    .badge-seed-inspection     { background: #fffae6; color: #7a5200; }
    .badge-seed-edge-cases     { background: #fffae6; color: #7a5200; }
    .badge-confirmed           { background: #e3fcef; color: #006644; }
    .badge-rejected            { background: #ffebe6; color: #bf2600; }
    .badge-pending             { background: #deebff; color: #0052cc; }
    .badge-superseded          { background: #fffae6; color: #7a5200; }

    /* ── Score pills ── */
    .score-pill {
      display: inline-block;
      background: #f0f1f3;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: .76rem;
      font-family: ui-monospace, 'SFMono-Regular', monospace;
      color: var(--muted);
    }

    /* ── Toast notification ── */
    #toast {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: .875rem;
      z-index: 9999;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      pointer-events: none;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="/admin/review">Price Scraper Admin</a>
  <a class="nav-link {% if request.path == '/admin/review' %}active{% endif %}"
     href="/admin/review">Review Queue</a>
  <a class="nav-link {% if request.path == '/admin/history' %}active{% endif %}"
     href="/admin/history">History</a>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<div id="toast"></div>

<script>
  function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = '';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.display = 'none'; }, duration || 2500);
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
