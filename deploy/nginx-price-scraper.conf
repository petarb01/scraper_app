# Rate-limit key: use real client IP from Cloudflare header when present,
# fall back to binary_remote_addr for direct local requests.
map $http_cf_connecting_ip $rate_key {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}

# 60 req/min for API, 10 req/min for admin
limit_req_zone $rate_key zone=api:10m   rate=60r/m;
limit_req_zone $rate_key zone=admin:10m rate=10r/m;

# Return 429 instead of default 503 on rate-limit breach
limit_req_status 429;

server {
    listen 80;
    server_name cijenabar.net;

    # Security headers — sent on every response
    add_header X-Frame-Options           "SAMEORIGIN"                              always;
    add_header X-Content-Type-Options    "nosniff"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;

    # Frontend (React)
    location / {
        proxy_pass            http://127.0.0.1:3000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    60s;
    }

    # Backend API
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass            http://127.0.0.1:5000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    60s;
    }

    # Admin panel — rate-limited strictly
    location /admin/ {
        limit_req zone=admin burst=5 nodelay;

        proxy_pass            http://127.0.0.1:5000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_read_timeout    60s;
    }
}
